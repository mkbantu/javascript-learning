<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker</title>
</head>
<body>
  <h1>My Expense Tracker</h1>
  
  <script>
    console.log("Ready to build!");
    const expense1={
        name:"coffee",
        amount: 3.50,
        category: "Food & Drink"
    };
    console.log(expense1);
    console.log("Expense Name: " + expense1.name);
    console.log("Expense Amount: $" + expense1.amount.toFixed(2));
    console.log("Expense Category: " + expense1.category);
  </script>
</body>
</html>
