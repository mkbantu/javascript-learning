<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker</title>
</head>
<body>
  <h1>My Expense Tracker</h1>
  
  <script>
    console.log("Ready to build!");
console.log("Ready to build!");
const tracker = {
  owner:'Mukundabantu',
   expenses: [
    { name: "Coffee", amount: 3.5, category: "Food & Drink" },
    { name: "Bus fare", amount: 2, category: "Transport" },
    { name: "Internet", amount: 20, category: "Bills" },
    { name: "Lunch", amount: 8, category: "Food & Drink" }
  ],
total:function() {
  return this.expenses.reduce((sum, expense) => sum + expense.amount, 0);
},
summary:function() {
  console.log(`${this.owner} expenses equals to ${this.total()}`);
}
};
tracker.summary();
  </script>
</body>
</html>
